<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Events - EventHub</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- NAV (same style as index) -->
  <nav class="navbar navbar-expand-lg py-3">
    <div class="container-xl">
      <a class="navbar-brand brand" href="index.html">EventHub<span class="brand-dot">.</span></a>

      <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- OFFCANVAS RIGHT MENU -->
      <div class="offcanvas offcanvas-end" tabindex="-1" id="mobileNav">
        <div class="offcanvas-header">
          <h5 class="offcanvas-title fw-bold">Menu</h5>
          <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>

        <div class="offcanvas-body">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-3 gap-2">

            <li class="nav-item" id="adminNavItem" style="display:none;">
              <a class="nav-link fw-semibold" href="admin.html">Admin</a>
            </li>

            <li class="nav-item">
              <a class="nav-link fw-semibold" href="index.html#about">About</a>
            </li>

            <li class="nav-item">
              <a class="nav-link fw-semibold active" href="events.html">Events</a>
            </li>

            <li class="nav-item" id="historyNavItem" style="display:none;">
              <a class="nav-link fw-semibold" href="history.html">My Bookings</a>
            </li>

            <li class="nav-item mt-2">
              <button id="navAuthBtn" class="btn btn-purple w-100">
                Login
              </button>
            </li>

          </ul>
        </div>
      </div>

    </div>
  </nav>

  <!-- EVENTS -->
  <section class="py-3">
    <div class="container-xl">

      <div class="card-soft p-4 p-md-5">
        <div class="d-flex flex-wrap justify-content-between align-items-start gap-3">
          <div>
            <div class="section-title">Explore Events</div>
            <div class="section-sub">Search, filter, and find events near you.</div>
          </div>

          <button id="btnLocation" class="btn btn-purple">
            📍 Use My Location
          </button>
        </div>

        <div class="mt-3">
          <input id="searchInput" class="form-control input-soft" placeholder="Search events, artist, city...">
        </div>

        <div class="mt-3">
          <div class="fw-bold mb-2">Categories</div>
          <div id="categoryChips" class="chips">
            <button class="chip active" data-value="All">All</button>
            <button class="chip" data-value="Concert">Concert</button>
            <button class="chip" data-value="Comedy">Comedy</button>
            <button class="chip" data-value="Workshop">Workshop</button>
          </div>
        </div>

        <div class="mt-3">
          <div class="fw-bold mb-2">Cities</div>
          <div id="cityChips" class="chips"></div>
        </div>
      </div>

      <!-- EVENTS LIST -->
      <div class="row g-3 mt-3" id="eventsGrid"></div>

    </div>
  </section>

  <!-- LOGIN MODAL -->
  <div id="loginBackdrop" class="modal-backdrop-custom">
    <div class="modal-card">
      <div class="d-flex justify-content-between align-items-center">
        <h4>Login</h4>
        <button class="modal-close" onclick="closeBackdrop('loginBackdrop')">×</button>
      </div>

      <div class="mb-2">
        <label class="fw-semibold mb-1">Email</label>
        <input id="li_email" class="form-control input-soft" type="email" placeholder="you@gmail.com">
      </div>
      <div class="mb-2">
        <label class="fw-semibold mb-1">Password</label>
        <input id="li_password" class="form-control input-soft" type="password" placeholder="••••••••">
      </div>

      <button class="btn btn-purple w-100 mt-2" onclick="loginSubmit()">Login</button>

      <div class="text-center mt-3 muted">
        No account? <span class="small-link" onclick="openSignup()">Create one</span>
      </div>
    </div>
  </div>

  <!-- SIGNUP MODAL -->
  <div id="signupBackdrop" class="modal-backdrop-custom">
    <div class="modal-card">
      <div class="d-flex justify-content-between align-items-center">
        <h4>Sign Up</h4>
        <button class="modal-close" onclick="closeBackdrop('signupBackdrop')">×</button>
      </div>

      <div class="mb-2">
        <label class="fw-semibold mb-1">Name</label>
        <input id="su_name" class="form-control input-soft" type="text" placeholder="Your name">
      </div>
      <div class="mb-2">
        <label class="fw-semibold mb-1">Email</label>
        <input id="su_email" class="form-control input-soft" type="email" placeholder="you@gmail.com">
      </div>
      <div class="mb-2">
        <label class="fw-semibold mb-1">Password</label>
        <input id="su_password" class="form-control input-soft" type="password" placeholder="Create password">
      </div>

      <button class="btn btn-purple w-100 mt-2" onclick="signupSubmit()">Create Account</button>

      <div class="text-center mt-3 muted">
        Already have an account? <span class="small-link" onclick="openLogin()">Login</span>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- IMPORTANT: these must be module -->
  <script type="module" src="./js/main.js"></script>
  <script type="module" src="./js/events.js"></script>
  <script type="module" src="./js/navbar.js"></script>

</body>
</html>
