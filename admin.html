<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin - EventHub</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="navbar navbar-expand-lg py-3">
    <div class="container-xl">
      <a class="navbar-brand brand" href="index.html">EventHub<span class="brand-dot">.</span></a>

      <div class="ms-auto d-flex align-items-center gap-2">
        <a href="events.html" class="btn btn-soft">Events</a>
        <a href="history.html" class="btn btn-soft">My Bookings</a>
        <button id="navAuthBtn" class="btn btn-purple">Login</button>
      </div>
    </div>
  </nav>

  <section class="py-3">
    <div class="container-xl">

      <div class="card-soft p-4 p-md-5">
        <div class="section-title">Admin Panel</div>
        <div class="section-sub">Add new events and manage existing ones.</div>

        <div class="row g-3 mt-3">
          <div class="col-lg-5">
            <div class="cat-card">
              <div class="fw-bold mb-2">Add Event</div>

              <div class="mb-2">
                <label class="fw-semibold mb-1">Title</label>
                <input id="ad_title" class="form-control input-soft" placeholder="Event title">
              </div>

              <div class="mb-2">
                <label class="fw-semibold mb-1">Category</label>
                <select id="ad_category" class="form-control input-soft">
                  <option>Concert</option>
                  <option>Comedy</option>
                  <option>Workshop</option>
                </select>
              </div>

              <div class="mb-2">
                <label class="fw-semibold mb-1">Artist / Host</label>
                <input id="ad_artist" class="form-control input-soft" placeholder="Artist name">
              </div>

              <div class="mb-2">
                <label class="fw-semibold mb-1">Address</label>
                <input id="ad_address" class="form-control input-soft" placeholder="Full address">
              </div>

              <div class="mb-2">
                <label class="fw-semibold mb-1">City</label>
                <input id="ad_city" class="form-control input-soft" placeholder="Hyderabad">
              </div>

              <div class="row g-2">
                <div class="col-6 mb-2">
                  <label class="fw-semibold mb-1">Latitude</label>
                  <input id="ad_lat" class="form-control input-soft" placeholder="17.3850">
                </div>
                <div class="col-6 mb-2">
                  <label class="fw-semibold mb-1">Longitude</label>
                  <input id="ad_lng" class="form-control input-soft" placeholder="78.4867">
                </div>
              </div>

              <div class="row g-2">
                <div class="col-6 mb-2">
                  <label class="fw-semibold mb-1">Date</label>
                  <input id="ad_date" type="date" class="form-control input-soft">
                </div>
                <div class="col-6 mb-2">
                  <label class="fw-semibold mb-1">Time</label>
                  <input id="ad_time" class="form-control input-soft" placeholder="7:30 PM">
                </div>
              </div>

              <div class="row g-2">
                <div class="col-6 mb-2">
                  <label class="fw-semibold mb-1">Ticket Price (₹)</label>
                  <input id="ad_price" type="number" class="form-control input-soft" placeholder="499">
                </div>
                <div class="col-6 mb-2">
                  <label class="fw-semibold mb-1">Available Tickets</label>
                  <input id="ad_tickets" type="number" class="form-control input-soft" placeholder="120">
                </div>
              </div>

              <div class="mb-2">
                <label class="fw-semibold mb-1">Poster Image URL</label>
                <input id="ad_poster" class="form-control input-soft" placeholder="https://...">
              </div>

              <button class="btn btn-purple w-100 mt-2" id="btnAddEvent">Add Event</button>
            </div>
          </div>

          <div class="col-lg-7">
            <div class="cat-card h-100">
              <div class="fw-bold mb-2">Existing Events</div>
              <div id="adminEventsGrid" class="row g-3"></div>

              <div id="adminEmpty" class="text-center muted py-5" style="display:none;">
                No events found.
              </div>
            </div>
          </div>
        </div>

      </div>

    </div>
  </section>

  <!-- LOGIN MODAL -->
  <div id="loginBackdrop" class="modal-backdrop-custom">
    <div class="modal-card">
      <div class="d-flex justify-content-between align-items-center">
        <h4>Login</h4>
        <button class="modal-close" onclick="closeBackdrop('loginBackdrop')">×</button>
      </div>

      <div class="mb-2">
        <label class="fw-semibold mb-1">Email</label>
        <input id="li_email" class="form-control input-soft" type="email" placeholder="you@gmail.com">
      </div>
      <div class="mb-2">
        <label class="fw-semibold mb-1">Password</label>
        <input id="li_password" class="form-control input-soft" type="password" placeholder="••••••••">
      </div>

      <button class="btn btn-purple w-100 mt-2" onclick="loginSubmit()">Login</button>

      <div class="text-center mt-3 muted">
        No account? <span class="small-link" onclick="openSignup()">Create one</span>
      </div>
    </div>
  </div>

  <!-- SIGNUP MODAL -->
  <div id="signupBackdrop" class="modal-backdrop-custom">
    <div class="modal-card">
      <div class="d-flex justify-content-between align-items-center">
        <h4>Sign Up</h4>
        <button class="modal-close" onclick="closeBackdrop('signupBackdrop')">×</button>
      </div>

      <div class="mb-2">
        <label class="fw-semibold mb-1">Name</label>
        <input id="su_name" class="form-control input-soft" type="text" placeholder="Your name">
      </div>
      <div class="mb-2">
        <label class="fw-semibold mb-1">Email</label>
        <input id="su_email" class="form-control input-soft" type="email" placeholder="you@gmail.com">
      </div>
      <div class="mb-2">
        <label class="fw-semibold mb-1">Password</label>
        <input id="su_password" class="form-control input-soft" type="password" placeholder="Create password">
      </div>

      <button class="btn btn-purple w-100 mt-2" onclick="signupSubmit()">Create Account</button>

      <div class="text-center mt-3 muted">
        Already have an account? <span class="small-link" onclick="openLogin()">Login</span>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script type="module" src="./js/main.js"></script>
  <script type="module" src="./js/admin.js"></script>
  <script type="module" src="./js/navbar.js"></script>


</body>
</html>
